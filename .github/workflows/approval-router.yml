name: Approval Router

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  actions: write

jobs:
  approve:
    if: startsWith(github.event.comment.body, '/approve')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Validate approval
        run: |
          python scripts/validate_approval.py \
            --issue-number "$ISSUE_NUMBER" \
            --actor "$ACTOR" \
            --comment "$COMMENT_BODY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ACTOR: ${{ github.actor }}
          COMMENT_BODY: ${{ github.event.comment.body }}

      - name: Trigger Salesforce executor
        run: |
          APPROVAL_ID="$(cat approval_id.txt)"

          echo "Triggering Salesforce executor for approval: $APPROVAL_ID"
          echo "Issue number: $ISSUE_NUMBER"

          gh workflow run salesforce-executor.yml \
            --ref main \
            -f approval_id="$APPROVAL_ID" \
            -f issue_number="$ISSUE_NUMBER"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}

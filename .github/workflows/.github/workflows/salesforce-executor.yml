name: Salesforce Executor

on:
  workflow_dispatch:
    inputs:
      approval_id:
        description: "Approval ID, for example gong-test-20260101123000"
        required: true
        type: string

permissions:
  contents: write
  issues: write

concurrency:
  group: sf-executor-${{ inputs.approval_id }}
  cancel-in-progress: false

jobs:
  execute:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Execute approved payload in test mode
        run: |
          python scripts/execute_salesforce_update.py \
            --approval-id "${{ inputs.approval_id }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
